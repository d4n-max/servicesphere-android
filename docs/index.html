<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ServiceSphere</title>
  <style>
    :root {
      color-scheme: light;
      --accent: #7C3AED;
      --text: #1f2937;
      --muted: #4b5563;
      --border: #e5e7eb;
      --bg: #ffffff;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    h1 {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: clamp(2rem, 7vw, 3.5rem);
      line-height: 1.1;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.1rem;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding-top: 8px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    a:focus,
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>ServiceSphere</h1>
    <p>Your Complete Field Service Ecosystem</p>
    <nav aria-label="Legal pages">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
    </nav>
  </main>
</body>
</html>
