<body class="bg-background text-on-background min-h-screen relative flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<header class="w-full top-0 sticky bg-surface shadow-sm z-40 flex items-center justify-between px-margin-mobile h-16 transition-colors duration-200">
<button aria-label="Go back" class="flex items-center justify-center p-2 -ml-2 rounded-full text-on-surface hover:bg-surface-container active:scale-95 transition-all duration-150" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface absolute left-1/2 -translate-x-1/2 font-bold tracking-tight">New Job</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 w-full max-w-2xl mx-auto px-margin-mobile py-margin-mobile pb-32 flex flex-col gap-stack-lg">
<form class="flex flex-col gap-stack-lg">
<section class="flex flex-col gap-stack-md bg-surface-container-lowest p-margin-mobile rounded-xl border border-surface-variant shadow-[0_2px_4px_rgba(0,0,0,0.02)]">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1" for="client">
                        Client
                        <span class="text-error">*</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">person</span>
<select class="w-full bg-surface-container-lowest border border-outline rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all appearance-none cursor-pointer" id="client" name="client">
<option disabled="" selected="" value="">Select a client</option>
<option value="1">Acme Corp</option>
<option value="2">Global Industries</option>
<option value="3">Sarah Connor</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">arrow_drop_down</span>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1" for="jobTitle">
                        Job Title
                        <span class="text-error">*</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">work</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline-variant" id="jobTitle" name="jobTitle" placeholder="e.g. HVAC Maintenance" type="text"/>
</div>
</div>
</section>
<section class="flex flex-col gap-stack-md bg-surface-container-lowest p-margin-mobile rounded-xl border border-surface-variant shadow-[0_2px_4px_rgba(0,0,0,0.02)]">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="address">Service Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">location_on</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline-variant" id="address" name="address" placeholder="Enter street address" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="date">Date</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">calendar_today</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-lg pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="date" name="date" type="date"/>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="time">Time</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">schedule</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-lg pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="time" name="time" type="time"/>
</div>
</div>
</div>
</section>
<section class="flex flex-col gap-stack-md bg-surface-container-lowest p-margin-mobile rounded-xl border border-surface-variant shadow-[0_2px_4px_rgba(0,0,0,0.02)]">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="description">Job Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline-variant resize-none" id="description" name="description" placeholder="Provide details about the work required..." rows="3"></textarea>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="price">Estimated Price</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">payments</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline-variant" id="price" name="price" placeholder="0.00" type="number"/>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="notes">Internal Notes (Optional)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">sticky_note_2</span>
<textarea class="w-full bg-surface-container-lowest border border-outline rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline-variant resize-none" id="notes" name="notes" placeholder="Notes for the team..." rows="2"></textarea>
</div>
</div>
</section>
</form>
</main>
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface border-t border-surface-variant shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-50">
<button class="w-full max-w-2xl mx-auto block bg-primary text-on-primary font-label-lg text-label-lg py-3.5 rounded-full text-center hover:bg-primary-fixed-variant active:scale-[0.98] transition-all duration-200 shadow-md" type="button">
            Save Job
        </button>
</div>
</body></html>
